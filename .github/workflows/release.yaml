name: Release

on:
  push:
    branches: [main, next, "*.x"] # main: stable, next: prereleases, N.x: maintenance

# Needed so semantic-release can push the version-bump commit + tag and create
# the GitHub Release.
permissions:
  contents: write

jobs:
  # 1. Run the suite, then let python-semantic-release decide the next version
  #    from the conventional-commit history, bump pyproject, write CHANGELOG.md,
  #    commit, tag (vX.Y.Z on main / vX.Y.Z-rc.N on next) and cut a GitHub Release.
  release:
    runs-on: ubuntu-latest
    outputs:
      released: ${{ steps.release.outputs.released }}
      version: ${{ steps.release.outputs.version }}
      tag: ${{ steps.release.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # semantic-release needs the full history + tags

      - name: Install uv and set the python version
        uses: astral-sh/setup-uv@v6
        with:
          version: "latest"
          python-version: "3.12"

      - name: Install the project
        run: uv sync --all-extras --dev

      - name: Run tests
        run: uv run pytest

      - name: Python Semantic Release
        id: release
        uses: python-semantic-release/python-semantic-release@v9
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

  # 2. Only if a release was actually cut: build the image at the new tag and
  #    push it under the semver "multi-tag" regime. metadata-action expands the
  #    tag into the full set, and automatically skips the moving major/minor/
  #    latest tags for prereleases:
  #      v1.2.3       -> 1.2.3, 1.2, 1, latest
  #      v1.2.3-rc.1  -> 1.2.3-rc.1
  docker:
    needs: release
    if: needs.release.outputs.released == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the released tag
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.release.outputs.tag }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker meta (semver multi-tag)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: jhnnsrs/rekuest
          tags: |
            type=semver,pattern={{version}},value=${{ needs.release.outputs.tag }}
            type=semver,pattern={{major}}.{{minor}},value=${{ needs.release.outputs.tag }}
            type=semver,pattern={{major}},value=${{ needs.release.outputs.tag }}
          # Only main (the newest major) owns `latest`. Maintenance releases off
          # an N.x branch still get their moving N / N.M tags but must NOT claim
          # `latest`, or shipping 1.5.3 would point latest back at the old major.
          flavor: |
            latest=${{ github.ref_name == 'main' }}

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      # Deploy to production only for stable releases — never for -rc prereleases.
      - name: Refresh Go-Arkitekt-live (stable releases only)
        if: ${{ !contains(needs.release.outputs.tag, '-') }}
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.GO_LIVE_HOST }}
          key: ${{ secrets.GO_LIVE_SSH_KEY }}
          username: ${{ secrets.GO_LIVE_USERNAME }}
          script: |
            cd /home/kontrol
            docker compose pull
            docker compose up -d
