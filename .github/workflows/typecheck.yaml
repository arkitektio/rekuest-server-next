name: Type Check

on:
  push:
    branches: [main, next]
  pull_request:
    branches: [main, next]

jobs:
  basedpyright:
    name: basedpyright
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv and set the python version
        uses: astral-sh/setup-uv@v6
        with:
          version: "latest"
          python-version: "3.12"

      - name: Install the project
        run: uv sync --all-extras --dev

      # Advisory for now: basedpyright is scoped to the typed facade/ plumbing
      # modules via [tool.basedpyright] in pyproject.toml. Reports type issues
      # without failing the build; drop `continue-on-error` to make it required.
      - name: Run basedpyright
        run: uv run basedpyright
        continue-on-error: true
