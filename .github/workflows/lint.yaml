name: Lint

on:
  push:
    branches: [main, next]
  pull_request:
    branches: [main, next]

jobs:
  ruff:
    name: Ruff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv and set the python version
        uses: astral-sh/setup-uv@v6
        with:
          version: "latest"
          python-version: "3.12"

      - name: Install the project
        run: uv sync --all-extras --dev

      # Advisory for now: these steps report issues without failing the build so
      # PRs aren't blocked while existing lint/format debt is burned down. Remove
      # `continue-on-error` (or set it to false) to make them required checks.
      - name: Ruff check
        run: uv run ruff check .
        continue-on-error: true

      - name: Ruff format check
        run: uv run ruff format --check .
        continue-on-error: true
