lok:
  issuer: lok
  key_type: RS256
  public_key: ssh-rsa 
provenance:
  # Rekuest acts as the provenance authority: it signs an attestation JWT per
  # non-trivial assignment. This keypair is orthogonal to the auth keys above
  # (different issuer, different lifetime). The private key never leaves Rekuest
  # and is never sent to agents. Dev keypair below — replace in production.
  issuer: rekuest
  kid: rekuest-prov-1
  token_ttl_seconds: 3600
  # role(s) on the auth token / membership that mark an accountable human.
  # Empty list = do not enforce the human-root invariant (lenient default).
  human_roles: []
  # require the human-root invariant; when true a non-human root refuses minting.
  strict: false
  private_key: |
    -----BEGIN PRIVATE KEY-----
    MC4CAQAwBQYDK2VwBCIEICiiKTIO7nNNDVtWjD79jxM7alsjZZEhVNICrYhdwr/x
    -----END PRIVATE KEY-----
  public_key: |
    -----BEGIN PUBLIC KEY-----
    MCowBQYDK2VwAyEADZ32a0NRsa619PGNaXJojnisFVMUfNF/i972xnNpj7M=
    -----END PUBLIC KEY-----
